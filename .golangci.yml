version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - nilerr

  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G104
        - G304
