version: "2"

run:
  timeout: 5m

linters:
  enable:
    # Correctness
    - errcheck          # unchecked errors (caught CloneProto type assertion)
    - govet             # suspicious constructs (shadow vars, struct alignment)
    - staticcheck       # comprehensive static analysis
    - unused            # unused code
    - nilerr            # returning nil after checking error

    # Security
    - gosec             # security-oriented rules

    # Bug prevention
    - gocritic          # opinionated but catches real bugs
    - copyloopvar       # captures loop variable in goroutine
    - durationcheck     # multiplication of durations
    - exhaustive        # missing enum cases in switch (would catch AUTO_APPROVED gap)
    - makezero          # append to non-zero-length slice
    - noctx             # http requests without context
    - reassign          # reassigning top-level vars
    - sqlclosecheck     # unclosed sql.Rows

    # Style + maintainability
    - revive            # configurable linter
    - ineffassign       # useless assignments
    - misspell          # spelling errors in comments/strings
    - whitespace        # unnecessary newlines

  settings:
    errcheck:
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: false
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam       # too noisy for proto messages
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic
      - path: vendor/
        linters:
          - ALL

    # Exclude exhaustive for existing code — enforce on new code via pre-commit
    rules:
      - path: ".*"
        linters:
          - exhaustive
        text: "missing cases"
