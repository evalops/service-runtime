version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - nilerr
    - revive

  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
