version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - nilerr
    - gosec
    - gocritic
    - copyloopvar
    - durationcheck
    - exhaustive
    - makezero
    - noctx
    - reassign
    - sqlclosecheck
    - revive
    - ineffassign
    - misspell
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: false
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic
          - noctx
      - path: vendor/
        linters:
          - ALL
