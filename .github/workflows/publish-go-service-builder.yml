name: Publish Go Service Builder

on:
  push:
    branches:
      - main
    paths:
      - images/go-service-builder/**
      - .github/workflows/publish-go-service-builder.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build and push builder image
        uses: ./.github/actions/publish-ghcr-image
        with:
          image_name: ghcr.io/evalops/service-runtime-go-builder
          github_actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dockerfile: images/go-service-builder/Dockerfile
          metadata_tags: |
            type=raw,value=go1.25
            type=raw,value=latest
            type=sha,prefix=sha-
          platforms: linux/amd64,linux/arm64
          push: "true"
