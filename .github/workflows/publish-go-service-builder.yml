name: Publish Go Service Builder

on:
  push:
    branches:
      - main
    paths:
      - images/go-service-builder/**
      - .github/workflows/publish-go-service-builder.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/evalops/service-runtime-go-builder
          tags: |
            type=raw,value=go1.25
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/go-service-builder/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
