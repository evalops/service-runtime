name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+$'
          head_tag="$(git tag --points-at "${GITHUB_SHA}" | grep -E "${semver_pattern}" | sort -V | tail -n 1 || true)"
          if [[ -n "${head_tag}" ]]; then
            echo "version=${head_tag}" >> "${GITHUB_OUTPUT}"
            echo "create_tag=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version_core="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version_core}"
          next_tag="v${major}.${minor}.$((patch + 1))"

          echo "version=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=true" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        if: steps.version.outputs.create_tag == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" "${GITHUB_SHA}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
