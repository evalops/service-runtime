name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Go service
        uses: ./.github/actions/setup-go-service
        with:
          cache: false
          download: false

      - name: Set up Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+$'
          head_tag="$(git tag --points-at "${GITHUB_SHA}" | grep -E "${semver_pattern}" | sort -V | tail -n 1 || true)"
          if [[ -n "${head_tag}" ]]; then
            echo "version=${head_tag}" >> "${GITHUB_OUTPUT}"
            echo "create_tag=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git tag -l | grep -E "${semver_pattern}" | sort -V | tail -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version_core="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version_core}"
          next_tag="v${major}.${minor}.$((patch + 1))"

          echo "version=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=true" >> "${GITHUB_OUTPUT}"

      - name: Verify release test suite
        env:
          GOFLAGS: -mod=vendor
        run: go test ./... -count=1 -race

      - name: Verify protobuf compatibility
        shell: bash
        run: |
          set -euo pipefail

          base_ref="$(git rev-parse "${GITHUB_SHA}^")"
          if git show "${base_ref}:buf.yaml" >/dev/null 2>&1; then
            buf breaking --against ".git#ref=${base_ref}"
          else
            echo "Skipping: no buf.yaml on ${base_ref}"
          fi

      - name: Delay release tag for manual abort window
        if: steps.version.outputs.create_tag == 'true'
        run: sleep 300

      - name: Create and push tag
        if: steps.version.outputs.create_tag == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" "${GITHUB_SHA}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

      - name: Smoke test released module from clean cache
        shell: bash
        env:
          GOFLAGS: ""
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          trap 'chmod -R u+w "${tmpdir}" 2>/dev/null || true; rm -rf "${tmpdir}"' EXIT

          export GOMODCACHE="${tmpdir}/modcache"
          export GOCACHE="${tmpdir}/gocache"
          workdir="${tmpdir}/work"
          mkdir -p "${GOMODCACHE}" "${GOCACHE}" "${workdir}"

          cd "${workdir}"
          go mod init release-smoke >/dev/null 2>&1
          cat <<'EOF' > main.go
          package main

          import _ "github.com/evalops/service-runtime/natsbus"

          func main() {}
          EOF

          for attempt in 1 2 3 4 5; do
            if go get "github.com/evalops/service-runtime@${VERSION}"; then
              go mod tidy
              go build .
              exit 0
            fi

            if [ "${attempt}" -eq 5 ]; then
              exit 1
            fi

            sleep 15
          done

      - name: Build hook release artifacts
        env:
          GOFLAGS: -mod=vendor
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${VERSION#v}"
          for goos in darwin linux; do
            for goarch in amd64 arm64; do
              archive="dist/evalops-agent-hook_${version}_${goos}_${goarch}.tar.gz"
              workdir="$(mktemp -d)"
              GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build -o "${workdir}/evalops-agent-hook" ./cmd/evalops-agent-hook
              tar -C "${workdir}" -czf "${archive}" evalops-agent-hook
              rm -rf "${workdir}"
            done
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*.tar.gz
          generate_release_notes: true
