name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go and run tests
        uses: ./.github/actions/setup-go-service
        with:
          go-version: "1.26.2"
          cache: false
          run-go-test: "true"
          go-test-race: "true"
          go-test-args: "./... -count=1"

      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go and run golangci-lint
        uses: ./.github/actions/setup-go-service
        with:
          go-version: "1.26.2"
          cache: false
          run-golangci-lint: "true"
          golangci-lint-args: "--timeout=5m ./..."

  security:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go and run security scans
        uses: ./.github/actions/setup-go-service
        with:
          go-version: "1.26.2"
          cache: false
          run-gosec: "true"
          run-govulncheck: "true"

  builder-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify builder image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: images/go-service-builder/Dockerfile
          tags: service-runtime-go-builder:test
