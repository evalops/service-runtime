name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go service environment
        uses: ./.github/actions/setup-go-service

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build ./...

  builder-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify builder image
        run: docker build -f images/go-service-builder/Dockerfile -t service-runtime-go-builder:test .
