name: Publish GHCR Image
description: Build and optionally push a Docker image to GHCR with shared metadata and Buildx setup.

outputs:
  tags:
    description: Resolved tags generated by docker/metadata-action.
    value: ${{ steps.meta.outputs.tags }}
  labels:
    description: Resolved labels generated by docker/metadata-action.
    value: ${{ steps.meta.outputs.labels }}
  digest:
    description: Digest emitted by docker/build-push-action.
    value: ${{ steps.build-image.outputs.digest }}

inputs:
  image_name:
    description: Fully-qualified image name, for example ghcr.io/evalops/service-runtime-go-builder
    required: true
  github_actor:
    description: GitHub actor used for GHCR login
    required: true
  github_token:
    description: Token used for GHCR login
    required: true
  context:
    description: Docker build context
    required: false
    default: .
  dockerfile:
    description: Path to the Dockerfile
    required: true
  target:
    description: Optional Docker target stage
    required: false
    default: ""
  build_args:
    description: Optional newline-delimited Docker build args
    required: false
    default: ""
  build-args:
    description: Deprecated alias for build_args
    required: false
    default: ""
  metadata_tags:
    description: Optional newline-delimited docker/metadata-action tags
    required: false
    default: |
      type=ref,event=branch
      type=ref,event=pr
      type=sha,prefix=sha-
      type=raw,value=latest,enable={{is_default_branch}}
  platforms:
    description: Target platforms for docker buildx
    required: false
    default: linux/amd64
  setup_qemu:
    description: Whether to install QEMU before creating the Buildx builder.
    required: false
    default: "false"
  push:
    description: Whether to push the built image
    required: false
    default: "false"
  load:
    description: Whether to load the built image into the local Docker daemon
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Normalize build args
      id: normalize-build-args
      shell: bash
      env:
        BUILD_ARGS: ${{ inputs.build_args }}
        LEGACY_BUILD_ARGS: ${{ inputs['build-args'] }}
      run: |
        set -euo pipefail

        if [ -n "$BUILD_ARGS" ] && [ -n "$LEGACY_BUILD_ARGS" ]; then
          echo "::error::Use only one of build_args or build-args."
          exit 1
        fi

        if [ -z "$BUILD_ARGS" ] && [ -n "$LEGACY_BUILD_ARGS" ]; then
          echo "::warning::Input build-args is deprecated; use build_args."
          BUILD_ARGS="$LEGACY_BUILD_ARGS"
        fi

        {
          echo "value<<EOF"
          printf '%s\n' "$BUILD_ARGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      if: ${{ inputs.setup_qemu == 'true' }}
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      if: ${{ inputs.push == 'true' }}
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.github_actor }}
        password: ${{ inputs.github_token }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.image_name }}
        tags: ${{ inputs.metadata_tags }}

    - name: Build image
      id: build-image
      uses: docker/build-push-action@v7
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.target }}
        build-args: ${{ steps.normalize-build-args.outputs.value }}
        secret-envs: |
          github_token=GITHUB_TOKEN
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push == 'true' }}
        load: ${{ inputs.load == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
