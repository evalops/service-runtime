name: Setup Go Service
description: Set up Go and configure EvalOps module resolution for shared service repos.

inputs:
  go-version:
    description: Explicit Go version passed through to actions/setup-go.
    required: false
    default: ""
  go-version-file:
    description: Path to the go.mod file used to select the Go version.
    required: false
    default: go.mod
  cache:
    description: Whether actions/setup-go should enable its built-in module cache.
    required: false
    default: "true"
  cache-dependency-path:
    description: Optional dependency file path passed through to actions/setup-go cache resolution.
    required: false
    default: ""
  check-latest:
    description: Whether actions/setup-go should check for the latest matching Go patch release.
    required: false
    default: "false"
  working-directory:
    description: Directory where go mod download should run.
    required: false
    default: .
  download:
    description: Whether to run go mod download after configuring Go.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Go from explicit version
      if: ${{ inputs.go-version != '' }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
        check-latest: ${{ inputs.check-latest }}

    - name: Set up Go from go.mod
      if: ${{ inputs.go-version == '' }}
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
        check-latest: ${{ inputs.check-latest }}

    - name: Configure EvalOps Go module resolution
      shell: bash
      run: |
        echo "GOPRIVATE=github.com/evalops/*" >> "$GITHUB_ENV"
        echo "GONOSUMDB=github.com/evalops/*" >> "$GITHUB_ENV"
        echo "GOPROXY=direct" >> "$GITHUB_ENV"

    - name: Download Go modules
      if: ${{ inputs.download == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go mod download
