name: Build Docker Image
description: Build a Docker image with shared EvalOps Buildx setup and normalized build args.

inputs:
  tags:
    description: Newline-delimited Docker image tags
    required: true
  context:
    description: Docker build context
    required: false
    default: .
  dockerfile:
    description: Path to the Dockerfile
    required: true
  target:
    description: Optional Docker target stage
    required: false
    default: ""
  build_args:
    description: Optional newline-delimited Docker build args
    required: false
    default: ""
  build-args:
    description: Deprecated alias for build_args
    required: false
    default: ""
  platforms:
    description: Target platforms for docker buildx
    required: false
    default: linux/amd64
  setup_qemu:
    description: Whether to install QEMU before creating the Buildx builder.
    required: false
    default: "false"
  load:
    description: Whether to load the built image into the local Docker daemon
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Normalize build args
      id: normalize-build-args
      shell: bash
      env:
        BUILD_ARGS: ${{ inputs.build_args }}
        LEGACY_BUILD_ARGS: ${{ inputs['build-args'] }}
      run: |
        set -euo pipefail

        if [ -n "$BUILD_ARGS" ] && [ -n "$LEGACY_BUILD_ARGS" ]; then
          echo "::error::Use only one of build_args or build-args."
          exit 1
        fi

        if [ -z "$BUILD_ARGS" ] && [ -n "$LEGACY_BUILD_ARGS" ]; then
          echo "::warning::Input build-args is deprecated; use build_args."
          BUILD_ARGS="$LEGACY_BUILD_ARGS"
        fi

        {
          echo "value<<EOF"
          printf '%s\n' "$BUILD_ARGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      if: ${{ inputs.setup_qemu == 'true' }}
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build image
      uses: docker/build-push-action@v7
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.target }}
        build-args: ${{ steps.normalize-build-args.outputs.value }}
        secret-envs: |
          github_token=GITHUB_TOKEN
        platforms: ${{ inputs.platforms }}
        load: ${{ inputs.load == 'true' }}
        tags: ${{ inputs.tags }}
