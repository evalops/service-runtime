syntax = "proto3";

package evalops.runtime.natsbus.v1;

option go_package = "github.com/evalops/service-runtime/gen/proto/go/evalops/runtime/natsbus/v1;natsbusv1";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

message EventEnvelope {
  string spec_version = 1;
  string id = 2;
  string type = 3;
  string source = 4;
  google.protobuf.Timestamp time = 5;
  string data_content_type = 6;
  string tenant_id = 7;
  google.protobuf.Any data = 8;
}
